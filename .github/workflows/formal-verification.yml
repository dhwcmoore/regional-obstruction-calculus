name: Formal verification

# Five independent, legible jobs -- python, rocq, rocq-trust, ocaml, r21
# -- each reproducing one of make check-all's checks from a fresh
# environment, against pinned toolchain versions. The ocaml job runs
# check-ocaml, check-assembly-parity, and check-contribution-parity --
# same toolchain, no separate job needed. See REPRODUCIBILITY.md for
# the exact commands and expected output each job's `make` target
# runs, and what the rocq-trust job's coqchk pass does and does not
# claim.
#
# Deliberately does not rely on any committed .vo/.glob/.cmi/.cmx/.o or
# executable artefact -- every job starts from a fresh checkout and
# fresh toolchain install, and each Makefile target under test removes
# stale build artefacts itself before compiling.
#
# The r21 job exists because the python job alone is not sufficient
# evidence for the R21 pipeline: without roc-verify-ocaml and
# roc-solve-extracted built first, tests/test_r21_cross_language_
# agreement.py, tests/test_r21_canonical_vectors.py, tests/test_r21_
# extracted_generator.py, and tests/test_r21_demonstration.py all skip
# gracefully rather than fail (by design, so a plain `make check-python`
# without an OCaml/opam-or-apt toolchain still passes) -- which means the
# python job on its own can go green while those tests silently never
# ran. The r21 job builds both binaries first and then explicitly fails
# if the pytest run reports ANY skip, closing that gap.

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  # Pinned exactly -- a CI run that installs whatever happens to be
  # current is not a reproducible proof build. See REPRODUCIBILITY.md's
  # "Verified toolchain versions" section, which must stay in sync with
  # these values.
  OCAML_VERSION: "4.14.1"
  COQ_VERSION: "8.18.0"
  PYTHON_VERSION: "3.12"

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -U pip
      - run: pip install -r requirements.txt
      - run: make check-python

  rocq:
    runs-on: ubuntu-latest
    # Hardcoded rather than interpolating env.COQ_VERSION -- the
    # container: key does not reliably support expressions in every
    # Actions runner version. Keep this in sync with env.COQ_VERSION
    # above and REPRODUCIBILITY.md's toolchain table by hand.
    #
    # options: --user root -- coqorg/coq images run as a non-root `coq`
    # user by default, which fails with EACCES when actions/checkout
    # tries to write to the runner's mounted _temp directory. Running
    # the container as root avoids that; the actual coqc/coqchk
    # commands below don't need any elevated privilege themselves.
    container:
      image: coqorg/coq:8.18.0
      options: --user root
    # coqorg/coq:8.18.0's opam switch is 4.13.1+flambda, and its bin
    # directory is not on PATH for a root shell (only for the image's
    # default, non-root `coq` user, whose profile scripts root does not
    # inherit) -- confirmed by actually running `find` in this exact
    # container in CI, not assumed. Adding it here directly rather than
    # depending on any profile/login-shell mechanism.
    env:
      PATH: /home/coq/.opam/4.13.1+flambda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - uses: actions/checkout@v4
      - run: make check-rocq

  rocq-trust:
    runs-on: ubuntu-latest
    container:
      image: coqorg/coq:8.18.0
      options: --user root
    env:
      PATH: /home/coq/.opam/4.13.1+flambda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - uses: actions/checkout@v4
      - run: make check-rocq-trust

  ocaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
      - run: opam exec -- make check-ocaml
      - run: opam exec -- make check-assembly-parity
      - run: opam exec -- make check-contribution-parity

  r21:
    # Pinned to ubuntu-24.04, not ubuntu-latest: apt-installs coq, ocaml,
    # and the three -ocaml-dev packages (zarith/yojson/sha) roc-verify-
    # ocaml and roc-solve-extracted need, matching this repository's own
    # Dockerfile exactly (see that file's own comment on why these three
    # packages are the "apt, not opam" route for this one job) so the
    # served versions stay the ones this job was actually checked against.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq ocaml ocaml-findlib \
            libzarith-ocaml-dev libyojson-ocaml-dev libsha-ocaml-dev
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m pip install -U pip
      - run: pip install -r requirements.txt
      - run: make check-r21-ocaml
      - run: make check-r21-extraction
      - name: Run the full pytest suite and require zero skips
        run: |
          set -o pipefail
          output="$(python3 -m pytest -q 2>&1)" || { echo "$output"; exit 1; }
          echo "$output"
          if echo "$output" | grep -qi "skipped"; then
            echo "::error::pytest reported skipped tests with both R21 binaries built -- every R21 test should run, not skip, in this job. This job exists specifically to catch that gap." >&2
            exit 1
          fi
          echo "$output" | grep -qE "^[0-9]+ passed( in [0-9.]+s)?$" || { echo "::error::pytest did not report a clean 'N passed' summary line" >&2; exit 1; }
